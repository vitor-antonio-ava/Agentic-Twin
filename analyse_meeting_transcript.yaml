ether Chi will be knocking on your door or not, but...</v>\r\n\r\n00:38:08.250 --> 00:38:14.850\r\n<v Antonino Sistac Plaza>DTLS isn't covered by PIP anywhere yet, and that for me, I think, would go an empirical agenda.</v>\r\n\r\n00:38:11.970 --> 00:38:32.530\r\n<v Antonino Sistac Plaza>It's so it's so it's not, but the the conversation had with Stephen is going to say it was 800K against, and like if you group the four lines together in terms of the proactive risk, this 800K, so that was it was asking asking a lot of questions, and obviously I'm not responsible for DTLS, the this DTLS and the FIL stuff, so I didn't I didn't know.</v>\r\n\r\n00:38:22.530 --> 00:38:22.770\r\n<v Antonino Sistac Plaza>Yeah.</v>\r\n\r\n00:38:24.770 --> 00:38:25.090\r\n<v Antonino Sistac Plaza>Yeah.</v>\r\n\r\n00:38:32.570 --> 00:38:37.570\r\n<v Antonino Sistac Plaza>what, like, if that spend was actually going to be spent this year or not. So I can answer that question.</v>\r\n\r\n00:38:34.130 --> 00:38:34.290\r\n<v Antonino Sistac Plaza>Yeah.</v>\r\n\r\n00:38:35.730 --> 00:38:36.130\r\n<v Antonino Sistac Plaza>Yeah.</v>\r\n\r\n00:38:36.930 --> 00:38:54.850\r\n<v Antonino Sistac Plaza>Yeah. No, don't worry. I can. And I answered that yesterday. It's continged. The DTLS should be funded centrally from what I understand. Some of these are really questions for tech. But don't worry. I think we can get to the bottom of it. Well, this is driven by the fact we just need to make sure that we don't spend anything until it's in a PIP.</v>\r\n\r\n00:38:38.370 --> 00:38:38.610\r\n<v Antonino Sistac Plaza>Yes.</v>\r\n\r\n00:38:40.930 --> 00:38:41.210\r\n<v Antonino Sistac Plaza>Okay.</v>\r\n\r\n00:38:44.850 --> 00:38:45.250\r\n<v Antonino Sistac Plaza>Right.</v>\r\n\r\n00:38:55.330 --> 00:39:01.650\r\n<v Antonino Sistac Plaza>I don't know who's doing the MPI launch engine PIP. I know there's an STP maybe in progress. You're doing it, Antonino.</v>\r\n\r\n00:39:01.490 --> 00:39:07.410\r\n<v Antonino Sistac Plaza>Yeah, I'm doing the PIP support. I don't have all the answers to do the PIP.</v>\r\n\r\n00:39:03.890 --> 00:39:04.370\r\n<v Antonino Sistac Plaza>Okay.</v>\r\n\r\n00:39:06.210 --> 00:39:10.610\r\n<v Antonino Sistac Plaza>Okay, no, that's fine. That's good to know, though, Antonino, because I think this will obviously feed into that conversation.</v>\r\n\r\n00:39:08.130 --> 00:39:08.290\r\n<v Antonino Sistac Plaza>No.</v>\r\n\r\n00:39:11.090 --> 00:39:11.410\r\n<v Antonino Sistac Plaza>Yeah.</v>\r\n\r\n00:39:11.730 --> 00:39:17.330\r\n<v Antonino Sistac Plaza>OK, so, so I think Stephen was more asking if I can support the the PIP Antonino.</v>\r\n\r\n00:39:15.570 --> 00:39:28.610\r\n<v Antonino Sistac Plaza>Yeah, what would help me? What would help me is if, and I can do it, I just need to understand whether we've already covered digital twins in the FIL pips. I don't want them in two. I don't want them in two pips. So that's fine. Yeah.</v>\r\n\r\n00:39:26.450 --> 00:39:46.610\r\n<v Antonino Sistac Plaza>Yes, for sure. But this is where this is where I have a bit of a concern that, you know, I've like been told that I'm business owner for Digital Twin or Digital Process Intelligence and also FIL, but I've had no input into the MPI launch system scope.</v>\r\n\r\n00:39:47.010 --> 00:40:06.690\r\n<v Antonino Sistac Plaza>So I am a bit worried that I'm not aligned to what has been agreed or committed. And fair enough, if we're talking to tech, that's one stream. But for me, they don't set the vision for digital process intelligence that needs to come from MSAT. So I think there is just a piece around like responsibilities and making sure that we're not duplicating because</v>\r\n\r\n00:40:02.130 --> 00:40:02.690\r\n<v Antonino Sistac Plaza>Stephen.</v>\r\n\r\n00:40:07.490 --> 00:40:25.770\r\n<v Antonino Sistac Plaza>if we're putting digital money for digital twins for this year, I think that is a huge risk because we don't have real time data and we don'