# Adaptive Card - Searchable Multi-Select KPI Dropdown
# Use Input.ChoiceSet with style:"filtered" and isMultiSelect:true
# 
# Power Fx to build the choices array dynamically:
# 
# Set(varKpiChoices, 
#     Concat(
#         ParseJSON(Topic.kpiData),
#         $"{{""title"": ""{Text(ThisRecord.'DIM_LIST_OF_KPIS[KPI_NAME]')} ({Text(ThisRecord.'DIM_LIST_OF_KPIS[KPI_ID]')})"", ""value"": ""{Text(ThisRecord.'DIM_LIST_OF_KPIS[KPI_ID]')}""}},",
#     )
# );
#
# Then inject varKpiChoices into the card JSON choices array.
# 
# Alternatively, use the formula below to set the full card JSON dynamically.

# ============================================================
# STATIC EXAMPLE (for testing in Adaptive Card Designer)
# ============================================================

type: AdaptiveCard
version: "1.5"
body:
  - type: Container
    style: emphasis
    bleed: true
    items:
      - type: ColumnSet
        columns:
          - type: Column
            width: auto
            items:
              - type: Image
                url: https://img.icons8.com/fluency/48/combo-chart.png
                size: Small
          - type: Column
            width: stretch
            verticalContentAlignment: center
            items:
              - type: TextBlock
                text: "KPI Selection"
                size: Large
                weight: Bolder
                color: Accent

  - type: TextBlock
    text: "Search and select the KPIs you want to track. You can select multiple items."
    wrap: true
    spacing: Medium

  - type: TextBlock
    text: "Search by name or ID:"
    weight: Bolder
    spacing: Medium

  - type: "Input.ChoiceSet"
    id: selectedKpis
    style: filtered
    isMultiSelect: true
    placeholder: "Type to search KPIs..."
    choices:
      - title: "Revenue Growth (KPI-001)"
        value: "KPI-001"
      - title: "Customer Satisfaction (KPI-002)"
        value: "KPI-002"
      - title: "Net Promoter Score (KPI-003)"
        value: "KPI-003"

  - type: TextBlock
    text: "💡 Tip: Type a KPI name or ID to filter the list"
    size: Small
    isSubtle: true
    spacing: Small

actions:
  - type: Action.Submit
    title: "Confirm Selection"
    style: positive
    data:
      action: submitKpiSelection
