        This is what I have so far:

        **Situation:**

        {Topic.situationData}

        **Current Response:**

        {Topic.currentResponseData}

        **Patient Impact:**

        {Topic.patientImpactData}

        **Balanced Scorecard:**

        {Topic.balancedScorecardData}

        **DIA:**

        {Topic.diaData}

        **Recommendation:**

        {Topic.recommendationData}

        **Next Steps:**

        {Topic.nextStepsData}
      entity:
        kind: EmbeddedEntity
        definition:
          kind: ClosedListEntity
          items:
            - id: Make some changes
              displayName: Make some changes

            - id: Looks good, let's continue
              displayName: Looks good, let's continue

    - kind: ConditionGroup
      id: conditionGroup_d5Vlaq
      conditions:
        - id: conditionItem_EB6Pry
          condition: =Topic.userChoice = 'cr1d7_agenttIFALA.topic.DIADataCapture.main.question_QThqKj'.'Make some changes'
          actions:
            - kind: SetVariable
              id: setVariable_45V2fT
              variable: Topic.skipToSummary
              value: =true

            - kind: SetVariable
              id: p94ysa
              variable: Topic.diaStepsList
              value: |-
                =    Table(
                        { StepNumber: 1, DisplayName: "Situation" },
                        { StepNumber: 2, DisplayName: "Current Response" },
                        { StepNumber: 3, DisplayName: "Patient Impact" },
                        { StepNumber: 4, DisplayName: "Balanced Scorecard" },
                        { StepNumber: 5, DisplayName: "DIA" },
                        { StepNumber: 6, DisplayName: "Recommendation" },
                        { StepNumber: 7, DisplayName: "Next Steps" }
                    )

            - kind: Question
