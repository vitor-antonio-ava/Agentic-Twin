      output: {}
      flowId: e3211915-8353-f111-bec7-000d3a33da71

    - kind: InvokeAIBuilderModelAction
      id: invokeAIBuilderModelAction_20Pyw3
      input:
        binding:
          balancedScorecardData: =Topic.balancedScorecardData
          currentResponse_200bData: =Topic.currentResponseData
          dia_sample: "Hi Team, Please find below a summary of the current situation and proposed actions related to the RFT metric deviation.  1. Situation Due to variations in how RFT is calculated across suppliers, a single deviation can lead to the DS RFT metric For example, in January 2026 there was one final batch from Axlpora with a single deviation, resulting in 0%   2. Current Response - The deviation is being managed through the standard DMAIC process with appropriate corrective actions - This is not a repeat occurrence. - The RFT calculation methodology will be discussed at the next Quality Council meeting with a proposal to   3. Patient Impact There is no impact to patients.  4. Balanced Scorecard Impact Updating the calculation methodology will allow for a more accurate representation of the RFT metric within 5. D.I.A (Decision / Information / Awareness) - Decision: EM DS Quality Council to confirm the proposed RFT calculation approach. - Awareness: EMLT informed regarding the expected impact on the RFT metric.  6. Recommendation Align Axplora RFT calculation methodology with other DS CMOs to ensure consistent reporting.  7. Next Steps Action: Discuss and confirm the RFT calculation approach Owner: Vincent Pourbaix Timeline: March 2026 Quality Council meeting  Please let me know if further clarification or additional information is required."
          diaData: =Topic.diaData
          nextStepsData: =Topic.nextStepsData
          patientImpactData_200b: =Topic.patientImpactData
          recommendationData: =Topic.recommendationData
          situation_200bData: =Topic.situationData

      output:
        binding:
          predictionOutput: Topic.aiReportOutput

      aIModelId: 3ee7436f-fcc1-4db7-8608-3100fd22cb4e

    - kind: SetMultipleVariables
