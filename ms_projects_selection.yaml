kind: AdaptiveDialog
beginDialog:
  kind: OnRedirect
  id: main
  actions:
    - kind: SendActivity
      id: sendActivity_bK3Jt2
      activity: Let's now fetch the available MS Projects...

    - kind: InvokeFlowAction
      id: invokeFlowAction_nJL8iH
      input: {}
      output:
        binding:
          msprojectslist: Topic.msProjectsList

      flowId: c8d2db9c-2537-f111-88b4-002248048965

    - kind: SetVariable
      id: m5q8qo
      variable: Topic.allMsProjectsList
      value: |-
        =ForAll(
            ParseJSON(Topic.msProjectsList),
            {
                projectId: Text(ThisRecord.'FCT_ACTIVE_MS_PROJECTS[ProjectId]'),
                projectName: Text(ThisRecord.'FCT_ACTIVE_MS_PROJECTS[ProjectName]'),
                owner: Text(ThisRecord.'FCT_ACTIVE_MS_PROJECTS[Owner]'),
                ownerEmail: Text(ThisRecord.'FCT_ACTIVE_MS_PROJECTS[Owner_Email]')
            }
        )

    - kind: SetVariable
      id: setVariable_TotalMsProjectsCount
      variable: Topic.totalMsProjectsCount
      value: =CountRows(Topic.allMsProjectsList)

    - kind: SetMultipleVariables
      id: setVariable_MsProjectsPaginationInit
      assignments:
        - variable: Topic.pageSize
          value: =20

        - variable: Topic.currentPage
          value: =1

        - variable: Topic.totalPages
          value: =RoundUp(Topic.totalMsProjectsCount / 20, 0)

    - kind: SetVariable
      id: setVariable_MsProjectsPageStart
      displayName: Calculate page start index
      variable: Topic.pageStartIndex
      value: =((Topic.currentPage - 1) * Topic.pageSize) + 1

    - kind: SetVariable
      id: setVariable_CurrentPageMsProjects
      displayName: Slice MS Projects for current page
      variable: Topic.currentPageMsProjects
      value: |-
        =FirstN(
            LastN(
                Topic.allMsProjectsList,
                Topic.totalMsProjectsCount - Topic.pageStartIndex + 1
            ),
            Topic.pageSize
        )

    - kind: SetVariable
      id: setVariable_MsProjectsPageDisplay
      variable: Topic.currentPageDisplayText
      value: |-
        =With(
            { startNum: Topic.pageStartIndex },
            Concat(
                ForAll(
                    Sequence(CountRows(Topic.currentPageMsProjects)),
                    With(
                        { projRow: Last(FirstN(Topic.currentPageMsProjects, Value)) },
                        {
                            line: Text(startNum + Value - 1) & ". **" &
                                  projRow.projectName & "** (ID: " &
                                  projRow.projectId & ") — Owner: " &
                                  projRow.owner & " (" & projRow.ownerEmail & ")"
                        }
                    )
                ),
                line,
                Char(10)
            )
        )

    - kind: SendActivity
      id: sendActivity_ShowMsProjectsPage
      activity: |-
        {If(
            Topic.totalMsProjectsCount > Topic.pageSize,
            "Showing page " & Text(Topic.currentPage) & " of " & Text(Topic.totalPages) &
            " (" & Text(Topic.totalMsProjectsCount) & " MS Projects total)" & Char(10) & Char(10),
            ""
        )}{Topic.currentPageDisplayText}

    - kind: Question
      id: question_SelectMsProjects
      interruptionPolicy:
        allowInterruption: true

      variable: init:Topic.userMsProjectSelection
      prompt: |-
        Which MS Projects would you like to link to meeting '{Global.selectedMeetingSubject}'?

        Select by number or name. You can select multiple (e.g. "1, 3, 5" or "Project Alpha, Project Beta").
        {If(Topic.totalPages > 1, "Type **'next'** to see the next page or **'prev'** for the previous page.", "")}
      entity: StringPrebuiltEntity

    - kind: ConditionGroup
      id: conditionGroup_MsProjectsPaginationCheck
      conditions:
        - id: conditionItem_MsProjectsNextPage
          condition: =Lower(Trim(Topic.userMsProjectSelection)) = "next"
          actions:
            - kind: ConditionGroup
              id: conditionGroup_MsProjectsCanGoNext
              conditions:
                - id: conditionItem_MsProjectsHasNextPage
                  condition: =Topic.currentPage < Topic.totalPages
                  actions:
                    - kind: SetVariable
                      id: setVariable_MsProjectsIncrementPage
                      variable: Topic.currentPage
                      value: =Topic.currentPage + 1

                    - kind: GotoAction
                      id: goto_MsProjectsShowNextPage
                      actionId: setVariable_MsProjectsPageStart

              elseActions:
                - kind: SendActivity
                  id: sendActivity_MsProjectsNoNextPage
                  activity: You're already on the last page.

                - kind: GotoAction
                  id: goto_MsProjectsReaskAfterNoNext
                  actionId: question_SelectMsProjects

        - id: conditionItem_MsProjectsPrevPage
          condition: =Lower(Trim(Topic.userMsProjectSelection)) = "prev"
          actions:
            - kind: ConditionGroup
              id: conditionGroup_MsProjectsCanGoPrev
              conditions:
                - id: conditionItem_MsProjectsHasPrevPage
                  condition: =Topic.currentPage > 1
                  actions:
                    - kind: SetVariable
                      id: setVariable_MsProjectsDecrementPage
                      variable: Topic.currentPage
                      value: =Topic.currentPage - 1

                    - kind: GotoAction
                      id: goto_MsProjectsShowPrevPage
                      actionId: setVariable_MsProjectsPageStart

              elseActions:
                - kind: SendActivity
                  id: sendActivity_MsProjectsNoPrevPage
                  activity: You're already on the first page.

                - kind: GotoAction
                  id: goto_MsProjectsReaskAfterNoPrev
                  actionId: question_SelectMsProjects

    - kind: InvokeAIBuilderModelAction
      id: invokeAIBuilderModelAction_MsProjects
      input:
        binding:
          msProjectsData: =Topic.msProjectsList
          userMsProjectSelection: =Topic.userMsProjectSelection

      output:
        binding:
          predictionOutput: Topic.resolvedMsProjectsJsonResult

      aIModelId: df42093e-4e06-4869-a837-5d807e913ff6

    - kind: SetVariable
      id: setVariable_ParseSelectedMsProjects
      variable: Topic.selectedMsProjectsList
      value: |-
        =ForAll(
            Topic.resolvedMsProjectsJsonResult.structuredOutput.result,
            {
                projectId: Text(ThisRecord.projectId),
                projectName: Text(ThisRecord.projectName),
                owner: Text(ThisRecord.owner),
                ownerEmail: Text(ThisRecord.ownerEmail)
            }
        )

    - kind: SetVariable
      id: setVariable_SelectedMsProjectsSummary
      variable: Topic.selectedMsProjectsSummaryText
      value: |-
        =Concat(
            ForAll(
                Sequence(CountRows(Topic.selectedMsProjectsList)),
                With(
                    { projRow: Last(FirstN(Topic.selectedMsProjectsList, Value)) },
                    {
                        line: Text(Value) & ". **" &
                              projRow.projectName & "** (" &
                              projRow.projectId & ") — Owner: " &
                              projRow.owner & " (" & projRow.ownerEmail & ")"
                    }
                )
            ),
            line,
            Char(13) & Char(10)
        )

    - kind: SendActivity
      id: sendActivity_ShowSelectedMsProjects
      activity: |-
        You selected {CountRows(Topic.selectedMsProjectsList)} MS Project(s):

        {Topic.selectedMsProjectsSummaryText}

inputType: {}
outputType: {}