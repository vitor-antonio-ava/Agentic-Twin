ForAll(
    Topic.actionsList,
    {
        actionId:         actionId,
        title:            title,
        description:      description,
        ownerDisplayName: ownerDisplayName,
        ownerEmail:       ownerEmail,
        ownerObjectId:    ownerObjectId,
        dueDate:          dueDate,
        priority:         priority,
        status:           status,
        source:           source,
        resolutionStatus: resolutionStatus,
        valid: And(
            // --- dueDate check: must be DD-MM-YYYY ---
            Len(dueDate) = 10,
            Mid(dueDate, 3, 1) = "-",
            Mid(dueDate, 6, 1) = "-",
            Value(Left(dueDate, 2)) >= 1,
            Value(Left(dueDate, 2)) <= 31,
            Value(Mid(dueDate, 4, 2)) >= 1,
            Value(Mid(dueDate, 4, 2)) <= 12,
            Value(Right(dueDate, 4)) >= 1900,
            // --- ownerEmail check: must be a valid email ---
            Not(IsBlank(ownerEmail)),
            Len(ownerEmail) - Len(Substitute(ownerEmail, "@", "")) = 1,
            Find("@", ownerEmail) > 1,
            Find(".", ownerEmail, Find("@", ownerEmail)) > Find("@", ownerEmail) + 1,
            Len(ownerEmail) > Find(".", ownerEmail, Find("@", ownerEmail)) + 1,
            // --- ownerDisplayName check: must not contain special characters ---
            Not(IsBlank(ownerDisplayName)),
            IsBlank(Find("&",  ownerDisplayName)),
            IsBlank(Find("*",  ownerDisplayName)),
            IsBlank(Find("#",  ownerDisplayName)),
            IsBlank(Find("$",  ownerDisplayName)),
            IsBlank(Find("%",  ownerDisplayName)),
            IsBlank(Find("!",  ownerDisplayName)),
            IsBlank(Find("^",  ownerDisplayName)),
            IsBlank(Find("(",  ownerDisplayName)),
            IsBlank(Find(")",  ownerDisplayName)),
            IsBlank(Find("[",  ownerDisplayName)),
            IsBlank(Find("]",  ownerDisplayName)),
            IsBlank(Find("{",  ownerDisplayName)),
            IsBlank(Find("}",  ownerDisplayName)),
            IsBlank(Find("<",  ownerDisplayName)),
            IsBlank(Find(">",  ownerDisplayName)),
            IsBlank(Find("/",  ownerDisplayName)),
            IsBlank(Find("\",  ownerDisplayName)),
            IsBlank(Find("|",  ownerDisplayName)),
            IsBlank(Find("~",  ownerDisplayName)),
            IsBlank(Find("`",  ownerDisplayName)),
            IsBlank(Find("+",  ownerDisplayName)),
            IsBlank(Find("=",  ownerDisplayName)),
            IsBlank(Find(";",  ownerDisplayName)),
            IsBlank(Find(":",  ownerDisplayName)),
            IsBlank(Find("""", ownerDisplayName)),
            IsBlank(Find("@",  ownerDisplayName)),
            IsBlank(Find("?",  ownerDisplayName))
        )
    }
)
