kind: AdaptiveDialog
modelDescription: |-
  Step 3 — KPI Selection (Per Meeting).
  Retrieves KPIs from Power BI (paginated, max 20 per page), lets the user select which KPIs to track,
  delegates owner assignment to the Assign KPI Owner topic, and confirms the final list before proceeding to Step 4.
beginDialog:
  kind: OnRedirect
  id: main
  actions:
    - kind: SendActivity
      id: sendActivity_Step3Start
      activity: Retrieving available KPIs for meeting **{Global.selectedMeetingSubject}**. One moment please...

    - kind: InvokeFlowAction
      id: invokeFlowAction_NqOm7T
      input: {}
      output:
        binding:
          kpidata: Topic.kpiData

      flowId: 52efb6eb-2537-f111-88b5-000d3a33da71

    - kind: ConditionGroup
      id: conditionGroup_VVjYSc
      conditions:
        - id: conditionItem_3IjMRh
          condition: =Topic.kpiData = "no_records"
          actions:
            - kind: Question
              id: question_vnrScA
              interruptionPolicy:
                allowInterruption: true

              variable: init:Topic.Var2
              prompt: I couldn't fetch any KPI's data. This might be due to a permissions error. Do you want to continue and skip KPI selection or cancel the meeting configuration
              entity:
                kind: EmbeddedEntity
                definition:
                  kind: ClosedListEntity
                  items:
                    - id: Continue and skip KPI selection
                      displayName: Continue and skip KPI selection

                    - id: Cancel meeting configuration
                      displayName: Cancel meeting configuration

            - kind: ConditionGroup
              id: conditionGroup_r1x6dy
              conditions:
                - id: conditionItem_ukxVRx
                  condition: =Topic.Var2 = 'cr1d7_agenttIFALA.topic.KPISelectionV2.main.question_vnrScA'.'Continue and skip KPI selection'
                  actions:
                    - kind: GotoAction
                      id: aukMIv
                      actionId: f4Bquh

                - id: conditionItem_b60Jh8
                  condition: =Topic.Var2 = 'cr1d7_agenttIFALA.topic.KPISelectionV2.main.question_vnrScA'.'Cancel meeting configuration'
                  actions:
                    - kind: BeginDialog
                      id: 9EDNl5
                      dialog: cr1d7_agenttIFALA.topic.ResetConversation

    - kind: SetVariable
      id: setVariable_ParseAllKPIs
      variable: Topic.allKPIsList
      value: |-
        =ForAll(
            ParseJSON(Topic.kpiData),
            {
                DisplayName: Text(ThisRecord.'DIM_LIST_OF_KPIS[KPI_NAME]'),
                Value: Text(ThisRecord.'DIM_LIST_OF_KPIS[KPI_ID]'),
                id: Text(ThisRecord.'DIM_LIST_OF_KPIS[KPI_ID]'),
                name: Text(ThisRecord.'DIM_LIST_OF_KPIS[KPI_NAME]'),
                description: Text(ThisRecord.'DIM_LIST_OF_KPIS[KPI_DESC]')
            }
        )

    - kind: AdaptiveCardPrompt
      id: LHLX1E
      card: |
        ={
          type: "AdaptiveCard",
          '$schema': "http://adaptivecards.io/schemas/adaptive-card.json",
          version: "1.5",
          body: [
            {
              type: "Container",
              style: "emphasis",
              bleed: true,
              items: [
                {
                  type: "ColumnSet",
                  columns: [
                    {
                      type: "Column",
                      width: "auto",
                      items: [
                        {
                          type: "Image",
                          url: "https://img.icons8.com/fluency/48/combo-chart.png",
                          size: "Small"
                        }
                      ]
                    },
                    {
                      type: "Column",
                      width: "stretch",
                      verticalContentAlignment: "Center",
                      items: [
                        {
                          type: "TextBlock",
                          text: "KPI Selection",
                          size: "Large",
                          weight: "Bolder",
                          color: "Accent"
                        }
                      ]
                    }
                  ]
                }
              ]
            },
            {
              type: "TextBlock",
              text: "Search and select the KPIs you want to track. You can select multiple items.",
              wrap: true,
              spacing: "Medium"
            },
            {
              type: "TextBlock",
              text: "Search by name or ID:",
              weight: "Bolder",
              spacing: "Medium"
            },
            {
              type: "Input.ChoiceSet",
              id: "selectedKpisData",
              style: "filtered",
              isMultiSelect: true,
              placeholder: "Type to search KPIs...",
              choices: ForAll(
                ParseJSON(Topic.kpiData),
                {
                  title: Text(ThisRecord.'DIM_LIST_OF_KPIS[KPI_NAME]') & " (" & Text(ThisRecord.'DIM_LIST_OF_KPIS[KPI_ID]') & ")",
                  value: Text(ThisRecord.'DIM_LIST_OF_KPIS[KPI_ID]')
                }
              )
            },
            {
              type: "TextBlock",
              text: "💡 Tip: Type a KPI name or ID to filter the list",
              size: "Small",
              isSubtle: true,
              spacing: "Small"
            },
            {
              type: "ActionSet",
              actions: [
                { type: "Action.Submit", id: "submitKpiSelection", title: "Confirm Selection", style: "positive" },
                { type: "Action.Submit", id: "skipKpiSelection", title: "Skip", style: "destructive" }
              ]
            }
          ]
        }
      output:
        binding:
          action: Topic.action
          actionSubmitId: Topic.actionSubmitId
          selectedKpisData: Topic.selectedKpisData

      outputType:
        properties:
          action: String
          actionSubmitId: String
          selectedKpisData: String

    - kind: SetVariable
      id: setVariable_TotalCount
      variable: Topic.totalKPICount
      value: =CountRows(Topic.allKPIsList)

    - kind: ConditionGroup
      id: conditionGroup_UlDxnn
      conditions:
        - id: conditionItem_0TTzPZ
          condition: =Topic.actionSubmitId = "Skip"
          actions:
            - kind: SetMultipleVariables
              id: f4Bquh
              assignments:
                - variable: Global.selectedKPIsList
                  value: =[]

                - variable: Global.selectedKPIsJson
                  value: =Blank()

            - kind: GotoAction
              id: PvZ7De
              actionId: qY48tx

    - kind: SetVariable
      id: setVariable_TjUOu1
      variable: Topic.Var1
      value: =Topic.selectedKpisData

    - kind: InvokeAIBuilderModelAction
      id: invokeAIBuilderModelAction_bVd9YT
      input:
        binding:
          kpiData: =Topic.kpiData
          userKPISelection: =Topic.Var1

      output:
        binding:
          predictionOutput: Topic.resolvedKPIsJsonResult

      aIModelId: df42093e-4e06-4869-a837-5d807e913ff6

    - kind: SetVariable
      id: setVariable_ParseSelectedKPIs
      variable: Topic.selectedKPIsList
      value: |-
        =ForAll(
            Topic.resolvedKPIsJsonResult.structuredOutput.matchedKPIs,
            {
                id: Text(ThisRecord.id),
                name: Text(ThisRecord.name),
                description: Text(ThisRecord.description)
            }
        )

    - kind: SetVariable
      id: setVariable_SelectedKPIsSummary
      variable: Topic.selectedKPIsSummaryText
      value: |-
        =Concat(
            ForAll(
                Sequence(CountRows(Topic.selectedKPIsList)),
                With(
                    { kpiRow: Last(FirstN(Topic.selectedKPIsList, Value)) },
                    {
                        line: Text(Value) & ". **" &
                              kpiRow.name & "** (" &
                              kpiRow.id & ")" &
                              If(
                                  !IsBlank(kpiRow.description),
                                  " — " & kpiRow.description,
                                  ""
                              )
                    }
                )
            ),
            line,
            Char(13) & Char(10)
        )

    - kind: SendActivity
      id: sendActivity_ShowSelectedKPIs
      activity: |-
        You selected {CountRows(Topic.selectedKPIsList)} KPI(s):

        {Topic.selectedKPIsSummaryText}

    - kind: SetVariable
      id: setVariable_KPIPayloadForOwnerAssignment
      variable: Topic.selectedKPIsPayload
      value: |-
        =JSON(
            ForAll(
                Topic.selectedKPIsList,
                {
                    id: id,
                    name: name,
                    description: description
                }
            )
        )

    - kind: SetVariable
      id: setVariable_EhBNxn
      variable: Topic.selectedKpis
      value: |-
        =ForAll(
            ParseJSON(Topic.selectedKPIsPayload),
            {
                id: ThisRecord.id,
                name: ThisRecord.name,
                description: ThisRecord.description
            }
        )

    - kind: SendActivity
      id: sendActivity_AssigningOwners
      activity: Let’s now assign owner(s) to each of the selected KPIs.

    - kind: BeginDialog
      id: beginDialog_AssignKPIOwner
      input:
        binding:
          Kpis: =Topic.selectedKPIsList

      dialog: cr1d7_agenttIFALA.topic.AssignKPIOwner
      output:
        binding:
          updatedKpis: Topic.kpisWithOwners

    - kind: SetVariable
      id: setVariable_ParseKPIsWithOwners
      variable: Topic.kpisWithOwnersList
      value: |-
        =ForAll(
            Topic.kpisWithOwners,
            {
                id: Text(ThisRecord.id),
                name: Text(ThisRecord.name),
                description: Text(ThisRecord.description),
                ownerId: Text(ThisRecord.ownerId),
                ownerName: Text(ThisRecord.owner),
                ownerEmail: Text(ThisRecord.ownerEmail)
            }
        )

    - kind: SetVariable
      id: setVariable_FinalKPISummary
      variable: Topic.finalKPISummaryText
      value: |-
        =Concat(
            ForAll(
                Sequence(CountRows(Topic.kpisWithOwnersList)),
                With(
                    { kpiRow: Last(FirstN(Topic.kpisWithOwnersList, Value)) },
                    {
                        line: Text(Value) & ". **" & kpiRow.name & "** (" & kpiRow.id & ")" & Char(13) & Char(10) &
                              "   Description: " & kpiRow.description & Char(13) & Char(10) &
                              "   Owner: " & kpiRow.ownerName & " (" & kpiRow.ownerEmail & ")"
                    }
                )
            ),
            line,
            Char(13) & Char(10)
        )

    - kind: SendActivity
      id: sendActivity_ShowFinalKPIs
      activity: |-
        Here are your selected KPIs with their assigned owners for this meeting:

        **{Global.selectedMeetingSubject}**:

        {Topic.finalKPISummaryText}

    - kind: Question
      id: question_ConfirmKPIs
      interruptionPolicy:
        allowInterruption: true

      variable: init:Topic.kpiConfirmation
      prompt: Does this look correct? Shall I proceed?
      entity:
        kind: EmbeddedEntity
        definition:
          kind: ClosedListEntity
          items:
            - id: Yes, proceed
              displayName: Yes, proceed

            - id: No, re-select KPIs
              displayName: No, re-select KPIs

    - kind: ConditionGroup
      id: conditionGroup_KPIConfirmation
      conditions:
        - id: conditionItem_KPIConfirmed
          condition: =Topic.kpiConfirmation = 'cr1d7_agenttIFALA.topic.KPISelectionV2.main.question_ConfirmKPIs'.'Yes, proceed'
          actions:
            - kind: SetMultipleVariables
              id: setVariable_SaveKPIsToGlobal
              assignments:
                - variable: Global.selectedKPIsList
                  value: =Topic.kpisWithOwners

                - variable: Global.selectedKPIsJson
                  value: |-
                    =JSON(
                        ForAll(
                            Topic.kpisWithOwnersList,
                            {
                                id: id,
                                name: name,
                                description: description,
                                ownerId: ownerId,
                                ownerName: ownerName,
                                ownerEmail: ownerEmail
                            }
                        )
                    )

            - kind: SendActivity
              id: sendActivity_KPIsSaved
              activity: KPI selection saved for **{Global.selectedMeetingSubject}**. Moving to the next step...

            - kind: BeginDialog
              id: qY48tx
              dialog: cr1d7_agenttIFALA.topic.MSProjectSelectionV2

        - id: conditionItem_KPIReselect
          condition: =Topic.kpiConfirmation = 'cr1d7_agenttIFALA.topic.KPISelectionV2.main.question_ConfirmKPIs'.'No, re-select KPIs'
          actions:
            - kind: SendActivity
              id: sendActivity_RestartKPISelection
              activity: No problem! Let's select your KPIs again.

            - kind: GotoAction
              id: oEV2G6
              actionId: LHLX1E