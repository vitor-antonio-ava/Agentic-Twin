{
  type: "AdaptiveCard",
  '$schema': "https://adaptivecards.io/schemas/adaptive-card.json",
  version: "1.5",
  body: [
    {
      type: "TextBlock",
      text: "Meeting Pre-Read Setup",
      size: "Large",
      weight: "Bolder",
      color: "Accent",
      spacing: "None"
    },
    {
      type: "TextBlock",
      text: "Review and update meeting details before sharing the pre-read.",
      wrap: true,
      size: "Small",
      isSubtle: true,
      spacing: "Small"
    },
    {
      type: "Container",
      separator: true,
      spacing: "Medium",
      items: [
        {
          type: "TextBlock",
          text: "Meeting Purpose",
          weight: "Bolder",
          size: "Small",
          spacing: "None"
        },
        {
          type: "Input.Text",
          id: "meetingPurpose",
          isMultiline: true,
          placeholder: "Enter meeting purpose...",
          value: Topic.Var1.MeetingPurpose
        }
      ]
    },
    {
      type: "Container",
      separator: true,
      spacing: "Medium",
      items: [
        {
          type: "TextBlock",
          text: "Meeting Attendees",
          weight: "Bolder",
          size: "Small",
          spacing: "None"
        },
        {
          type: "TextBlock",
          text: Topic.meetingAttendees,
          wrap: true,
          size: "Small"
        }
      ]
    },
    {
      type: "Container",
      separator: true,
      spacing: "Medium",
      items: [
        {
          type: "TextBlock",
          text: "Inputs",
          weight: "Bolder",
          size: "Small",
          spacing: "None"
        },
        {
          type: "Input.Text",
          id: "meetingInputs",
          isMultiline: true,
          placeholder: "Test",
          value: "KPI Dashboard (Power Bi)" & Char(10) & "MPR Report (Power Bi)" & Char(10) & "SD/SiP Report (Power Bi)" & Char(10) & "Decisions Required & SPADM"
        }
      ]
    },
    {
      type: "Container",
      separator: true,
      spacing: "Medium",
      items: [
        {
          type: "TextBlock",
          text: "Outputs",
          weight: "Bolder",
          size: "Small",
          spacing: "None"
        },
        {
          type: "Input.Text",
          id: "meetingOutputs",
          isMultiline: true,
          placeholder: "Test",
          value: "D - MPR Decisions" & Char(10) & "I - Interventions / Actions / Help Required" & Char(10) & "I - Problem Solve Focus Areas" & Char(10) & "A - KPI + critical programme status (Projects and SD Initiatives)" & Char(10) & "A - Successes, Recognition"
        }
      ]
    },
    {
      type: "Container",
      separator: true,
      spacing: "Medium",
      items: [
        {
          type: "TextBlock",
          text: "Meeting Agenda",
          weight: "Bolder",
          size: "Small",
          spacing: "None"
        },
        {
          type: "TextBlock",
          text: $"{CountRows(Topic.submittedDIATable)} topic(s) from submitted DIAs",
          size: "Small",
          isSubtle: true,
          spacing: "None"
        }
      ]
    },
    {
      type: "Container",
      spacing: "Small",
      items: [
        {
          type: "ColumnSet",
          spacing: "Small",
          columns: [
            {
              type: "Column",
              width: "90px",
              items: [
                {
                  type: "TextBlock",
                  text: "Time",
                  weight: "Bolder",
                  size: "Small"
                }
              ]
            },
            {
              type: "Column",
              width: "stretch",
              items: [
                {
                  type: "TextBlock",
                  text: "Topic",
                  weight: "Bolder",
                  size: "Small"
                }
              ]
            },
            {
              type: "Column",
              width: "120px",
              items: [
                {
                  type: "TextBlock",
                  text: "Owner",
                  weight: "Bolder",
                  size: "Small"
                }
              ]
            }
          ]
        }
      ]
    },
    {
      type: "Container",
      spacing: "None",
      items: ForAll(
        Sequence(CountRows(Topic.submittedDIATable)),
        With(
          {
            currentItem: Index(Topic.submittedDIATable, Value),
            localStartTime: DateAdd(Topic.calendarEvent.startWithTimeZone, System.Conversation.LocalTimeZoneOffset, TimeUnit.Minutes),
            slotTime: DateAdd(DateAdd(Topic.calendarEvent.startWithTimeZone, System.Conversation.LocalTimeZoneOffset, TimeUnit.Minutes), (Value - 1) * 10, TimeUnit.Minutes)
          },
          {
            type: "ColumnSet",
            separator: true,
            spacing: "Small",
            columns: [
              {
                type: "Column",
                width: "90px",
                items: [
                  {
                    type: "Input.Text",
                    id: $"time_{Value}",
                    value: Text(slotTime, "HH:mm"),
                    placeholder: "00:00"
                  }
                ]
              },
              {
                type: "Column",
                width: "stretch",
                items: [
                  {
                    type: "TextBlock",
                    text: currentItem.DIATaskName,
                    wrap: true,
                    size: "Small"
                  },
                  {
                    type: "TextBlock",
                    text: $"Type: " & currentItem.DIATaskType,
                    size: "Small",
                    isSubtle: true
                  }
                ]
              },
              {
                type: "Column",
                width: "120px",
                items: [
                  {
                    type: "TextBlock",
                    text: currentItem.AssignedOwnerName & " - " & currentItem.AssignedOwnerEmail,
                    size: "Small",
                    wrap: true
                  }
                ]
              }
            ]
          }
        )
      )
    },
    {
      type: "Container",
      separator: true,
      spacing: "Medium",
      items: [
        {
          type: "TextBlock",
          text: "Additional Agenda Items",
          weight: "Bolder",
          size: "Small",
          spacing: "None"
        },
        {
          type: "ColumnSet",
          spacing: "Small",
          columns: [
            {
              type: "Column",
              width: "90px",
              items: [
                {
                  type: "Input.Text",
                  id: "additionalTime1",
                  placeholder: "HH:mm",
                  value: Text(DateAdd(DateAdd(Topic.calendarEvent.startWithTimeZone, System.Conversation.LocalTimeZoneOffset, TimeUnit.Minutes), CountRows(Topic.submittedDIATable) * 10, TimeUnit.Minutes), "HH:mm")
                }
              ]
            },
            {
              type: "Column",
              width: "stretch",
              items: [
                {
                  type: "Input.Text",
                  id: "additionalTopic1",
                  placeholder: "Enter topic..."
                }
              ]
            }
          ]
        },
        {
          type: "ColumnSet",
          spacing: "Small",
          columns: [
            {
              type: "Column",
              width: "90px",
              items: [
                {
                  type: "Input.Text",
                  id: "additionalTime2",
                  placeholder: "HH:mm",
                  value: Text(DateAdd(DateAdd(Topic.calendarEvent.startWithTimeZone, System.Conversation.LocalTimeZoneOffset, TimeUnit.Minutes), (CountRows(Topic.submittedDIATable) + 1) * 10, TimeUnit.Minutes), "HH:mm")
                }
              ]
            },
            {
              type: "Column",
              width: "stretch",
              items: [
                {
                  type: "Input.Text",
                  id: "additionalTopic2",
                  placeholder: "Enter topic..."
                }
              ]
            }
          ]
        },
        {
          type: "ColumnSet",
          spacing: "Small",
          columns: [
            {
              type: "Column",
              width: "90px",
              items: [
                {
                  type: "Input.Text",
                  id: "additionalTime3",
                  placeholder: "HH:mm",
                  value: Text(DateAdd(DateAdd(Topic.calendarEvent.startWithTimeZone, System.Conversation.LocalTimeZoneOffset, TimeUnit.Minutes), (CountRows(Topic.submittedDIATable) + 2) * 10, TimeUnit.Minutes), "HH:mm")
                }
              ]
            },
            {
              type: "Column",
              width: "stretch",
              items: [
                {
                  type: "Input.Text",
                  id: "additionalTopic3",
                  placeholder: "Enter topic..."
                }
              ]
            }
          ]
        },
        {
          type: "ColumnSet",
          spacing: "Small",
          columns: [
            {
              type: "Column",
              width: "90px",
              items: [
                {
                  type: "Input.Text",
                  id: "additionalTime4",
                  placeholder: "HH:mm"
                }
              ]
            },
            {
              type: "Column",
              width: "stretch",
              items: [
                {
                  type: "Input.Text",
                  id: "additionalTopic4",
                  placeholder: "Enter topic..."
                }
              ]
            }
          ]
        },
        {
          type: "ColumnSet",
          spacing: "Small",
          columns: [
            {
              type: "Column",
              width: "90px",
              items: [
                {
                  type: "Input.Text",
                  id: "additionalTime5",
                  placeholder: "HH:mm"
                }
              ]
            },
            {
              type: "Column",
              width: "stretch",
              items: [
                {
                  type: "Input.Text",
                  id: "additionalTopic5",
                  placeholder: "Enter topic..."
                }
              ]
            }
          ]
        }
      ]
    }
  ],
  actions: [
    {
      type: "Action.Submit",
      title: "Confirm Pre-Read",
      style: "positive",
      data: {
        action: "confirm_preread"
      }
    },
    {
      type: "Action.Submit",
      title: "Cancel Pre-Read",
      style: "default",
      data: {
        action: "cancel_preread"
      }
    }
  ]
}