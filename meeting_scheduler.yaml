kind: AdaptiveDialog
modelDescription: This topic helps users schedule meetings.
beginDialog:
  kind: OnRedirect
  id: main
  actions:
    - kind: SendActivity
      id: sendMessage_M0LuhV
      activity:
        text:
          - I'm going now to help schedule a follow-up meeting. I’ll check availability for mandatory attendees and propose time options. Shall we begin?
        speak:
          - Hello and thank you for calling {System.Bot.Name}. Please note that some responses are generated by AI and may require verification for accuracy. How may I help you today?

    - kind: SetMultipleVariables
      id: setVariable_fA72pV
      assignments:
        - variable: Topic.mandatoryAttendees
          value: =Global.currentMeeting.requiredAttendees

        - variable: Topic.optionalAttendees
          value: =Global.currentMeeting.optionalAttendees

    - kind: SetMultipleVariables
      id: setVariable_wsf5TD
      assignments:
        - variable: Topic.Var3
          value: |-
            =Concat(
                ForAll(
                    Split(Topic.mandatoryAttendees, ","),
                    {
                        email: Text(ThisRecord.Value)
                    }
                ),
                email,
                ", "
            )

        - variable: Topic.Var4
          value: |-
            =Concat(
                ForAll(
                    Split(Topic.optionalAttendees,","),
                    {
                        email: Text(ThisRecord.Value)
                    }
                ),
                email,
                ", "
            )

    - kind: SendActivity
      id: sendActivity_RlUmnM
      activity: |-
        Here’s what I have so far:

        Mandatory attendees:

        {Topic.Var3}


        Optional attendees:

        {Topic.Var4}

    - kind: Question
      id: question_9VWPlw
      interruptionPolicy:
        allowInterruption: true

      variable: init:Topic.updateAttendees
      prompt: Would you like to update anyone before I check availability?
      entity:
        kind: EmbeddedEntity
        definition:
          kind: ClosedListEntity
          items:
            - id: Yes
              displayName: Yes

            - id: No
              displayName: No

    - kind: ConditionGroup
      id: conditionGroup_u0ikwO
      conditions:
        - id: conditionItem_0mAxkP
          condition: =Topic.updateAttendees = 'copilots_header_a34f2.topic.scheduling_MeetingScheduler.main.question_9VWPlw'.Yes
          actions:
            - kind: Question
              id: question_znebJB
              interruptionPolicy:
                allowInterruption: true

              variable: init:Topic.userChangeRequestText
              prompt: |-
                Tell me what to change. 
                For example:
                ‘Move Sarah from optional to mandatory’ or ‘Remove John’ or ‘Add Ahmed as mandatory’.
              entity: StringPrebuiltEntity

            - kind: SearchAndSummarizeContent
              id: NCC3Nd
              latencyMessageSettings:
                allowLatencyMessage: false

              autoSend: false
              variable: Topic.generativeAnswer
              userInput: =Topic.userChangeRequestText
              additionalInstructions: |-
                Detect the names of the attendees from the user response stored in
                {Topic.userChangeRequestText}
                Return ONLY valid JSON in this format:
                "message": "human readable response to show user",
                "mandatory": ["email" , "email"],
                "optional": ["email", "email"]
                Do not include explanations or additional text.
              responseCaptureType: FullResponse

        - id: conditionItem_wg5PUj
          condition: =Topic.updateAttendees = 'copilots_header_a34f2.topic.scheduling_MeetingScheduler.main.question_9VWPlw'.No

    - kind: SetVariable
      id: setVariable_Pc1Shf
      variable: Topic.mandatoryAttendees
      value: |-
        =If(
            !IsBlank(ParseJSON(Topic.generativeAnswer.Text.Content).mandatory),
            ParseJSON(Topic.generativeAnswer.Text.Content).mandatory,
            Topic.mandatoryAttendees
        )

    - kind: SetVariable
      id: setVariable_s0AiTT
      variable: Topic.optionalAttendees
      value: |-
        =If(
            !IsBlank(ParseJSON(Topic.generativeAnswer.Text.Content).optional),
            ParseJSON(Topic.generativeAnswer.Text.Content).optional,
            Topic.optionalAttendees
        )

    - kind: SetVariable
      id: setVariable_NquX9I
      variable: Topic.requiredAttendeesEmails
      value: |-
        =Concat(
            ForAll(Split(Topic.mandatoryAttendees, ","),
                {
                    email: Text(ThisRecord.Value)
                }
            ),
            email,
            ", "
        )

    - kind: SetVariable
      id: setVariable_KPXEDr
      variable: Topic.optionalAttendeesEmails
      value: |-
        =Concat(
            ForAll(Split(Topic.optionalAttendees, ","),
                {
                    email: Text(ThisRecord.Value)
                }
            ),
            email,
            ", "
        )

    - kind: SetMultipleVariables
      id: setVariable_OqiOf4
      assignments:
        - variable: Global.currentMeeting.requiredAttendees
          value: =Topic.requiredAttendeesEmails

        - variable: Global.currentMeeting.optionalAttendees
          value: =Topic.optionalAttendeesEmails

    - kind: SendActivity
      id: sendActivity_Ebq9bJ
      activity: |-
        Mandatory attendees:

        {Topic.requiredAttendeesEmails}

        Optional attendees:

        {Topic.optionalAttendeesEmails}

    - kind: Question
      id: question_pqZ5ya
      interruptionPolicy:
        allowInterruption: true

      unrecognizedPrompt: Please choose one of the 2 given values.
      alwaysPrompt: true
      variable: init:Topic.meetingDurationSelected
      prompt: What meeting duration should I set? (Minutes)
      entity:
        kind: EmbeddedEntity
        definition:
          kind: ClosedListEntity
          items:
            - id: 30
              displayName: 30

            - id: 60
              displayName: 60

    - kind: ConditionGroup
      id: conditionGroup_9MwUiz
      conditions:
        - id: conditionItem_YOohTO
          condition: =Topic.meetingDurationSelected = 'copilots_header_a34f2.topic.scheduling_MeetingScheduler.main.question_pqZ5ya'.'30'

        - id: conditionItem_vfWDXI
          condition: =Topic.meetingDurationSelected = 'copilots_header_a34f2.topic.scheduling_MeetingScheduler.main.question_pqZ5ya'.'60'

    - kind: ParseValue
      id: QnkWBL
      variable: Topic.meetingDurationValue
      valueType: Number
      value: =Text(Topic.meetingDurationSelected)

    - kind: SetMultipleVariables
      id: setVariable_hCOQV3
      assignments:
        - variable: Topic.mandatoryGSKEmails
          value: |-
            =Concat(
                Filter(
                    Split(Topic.requiredAttendeesEmails, ", "),
                    !IsBlank(Find("@gsk.com", Value))
                ),
                Value,
                ", "
            )

        - variable: Topic.optionalGSKEmails
          value: |-
            =Concat(
                Filter(
                    Split(Topic.optionalAttendeesEmails, ", "),
                    !IsBlank(Find("@gsk.com", Value))
                ),
                Value,
                ", "
            )

    - kind: InvokeFlowAction
      id: invokeFlowAction_nvi4mV
      input:
        binding:
          number: =Topic.meetingDurationValue
          text: =Topic.requiredAttendeesEmails
          text_1: =Topic.optionalAttendeesEmails

      output:
        binding:
          meetingtimesfiltered: Topic.meetingTimesFiltered
          meetingtimesraw: Topic.meetingTimesRaw
          option1end: Topic.option1End
          option1start: Topic.option1Start
          option1text: Topic.option1Text
          option2end: Topic.option2End
          option2start: Topic.option2Start
          option2text: Topic.option2Text

      flowId: 5f39b541-60bb-3274-251a-57e3ff00ed82

    - kind: SetMultipleVariables
      id: setVariable_vdUW4s
      assignments:
        - variable: Global.confirmedSlotStartDateTime
          value: =DateTimeValue(Topic.option1Start)

        - variable: Global.confirmedSlotEndDateTime
          value: =DateTimeValue(Topic.option1End)

        - variable: Topic.confirmedUserOption
          value: =Topic.option1Text

    - kind: SetMultipleVariables
      id: setVariable_rl4mys
      assignments:
        - variable: Topic.option2StartDateTime
          value: =DateTimeValue(Topic.option2Start)

        - variable: Topic.option2EndDateTime
          value: =DateTimeValue(Topic.option2End)

    - kind: Question
      id: question_WUG5D4
      interruptionPolicy:
        allowInterruption: true

      unrecognizedPrompt: Please choose one of the 2 provided options.
      alwaysPrompt: true
      variable: init:Topic.userFinalMeetingChoice
      prompt: |-
        Here are two available options for mandatory attendees:

        Option 1:
        {Topic.option1Text}
        {Global.confirmedSlotStartDateTime}
        {Global.confirmedSlotEndDateTime}


        Option 2:
        {Topic.option2Text}
        {Topic.option2StartDateTime}
        {Topic.option2EndDateTime}


        Which one would you like to use?
      entity:
        kind: EmbeddedEntity
        definition:
          kind: ClosedListEntity
          items:
            - id: Option 1
              displayName: Option 1

            - id: Option 2
              displayName: Option 2

    - kind: ConditionGroup
      id: conditionGroup_oJh5AN
      conditions:
        - id: conditionItem_qUjPFW
          condition: =Topic.userFinalMeetingChoice = 'copilots_header_a34f2.topic.scheduling_MeetingScheduler.main.question_WUG5D4'.'Option 1'

        - id: conditionItem_pHUCui
          condition: =Topic.userFinalMeetingChoice = 'copilots_header_a34f2.topic.scheduling_MeetingScheduler.main.question_WUG5D4'.'Option 2'
          actions:
            - kind: SetMultipleVariables
              id: setVariable_Jn23kB
              assignments:
                - variable: Global.confirmedSlotStartDateTime
                  value: =Topic.option2StartDateTime

                - variable: Global.confirmedSlotEndDateTime
                  value: =Topic.option2EndDateTime

                - variable: Topic.confirmedUserOption
                  value: =Topic.option2Text

    - kind: SetVariable
      id: setVariable_KPWUaV
      variable: Topic.meetingTitle
      value: =Global.currentMeeting.subject

    - kind: ConditionGroup
      id: conditionGroup_m7cWMh
      conditions:
        - id: conditionItem_QMGQZn
          condition: =!IsBlank(Topic.meetingTitle)
          actions:
            - kind: Question
              id: question_bzu7tu
              interruptionPolicy:
                allowInterruption: true

              variable: init:Topic.userChangeMeetingTitleChoice
              prompt: |-
                Based on the summary/pre-read data the meeting title is set to:

                {Topic.meetingTitle}

                Do want to keep it or change it?
              entity:
                kind: EmbeddedEntity
                definition:
                  kind: ClosedListEntity
                  items:
                    - id: Change Title
                      displayName: Change Title

                    - id: Keep Title
                      displayName: Keep Title

            - kind: ConditionGroup
              id: conditionGroup_2wCjqW
              conditions:
                - id: conditionItem_8ltKb1
                  condition: =Topic.userChangeMeetingTitleChoice = 'copilots_header_a34f2.topic.scheduling_MeetingScheduler.main.question_bzu7tu'.'Change Title'
                  actions:
                    - kind: Question
                      id: question_ORG2kD
                      interruptionPolicy:
                        allowInterruption: true

                      variable: Topic.userWrittenMeetingTitle2
                      prompt: Please provide a meeting title/subject
                      entity:
                        kind: StringPrebuiltEntity
                        sensitivityLevel: None

                - id: conditionItem_NZoYU1
                  condition: =Topic.userChangeMeetingTitleChoice = 'copilots_header_a34f2.topic.scheduling_MeetingScheduler.main.question_bzu7tu'.'Keep Title'

        - id: conditionItem_fERzTv
          condition: =IsBlank(Topic.meetingTitle)
          actions:
            - kind: Question
              id: question_sMo7Sm
              interruptionPolicy:
                allowInterruption: true

              variable: init:Topic.Var1
              prompt: Please provide a meeting title or email subject.
              entity: StringPrebuiltEntity

      elseActions:
        - kind: Question
          id: question_wrzaq6
          interruptionPolicy:
            allowInterruption: true

          variable: Topic.meetingTitle
          prompt: Please provide a meeting title/subject
          entity:
            kind: StringPrebuiltEntity
            sensitivityLevel: None

    - kind: SetVariable
      id: setVariable_R8mkgw
      variable: Topic.userMeetingTitle
      value: |-
        =If(
            !IsBlank(Topic.Var1),
            Topic.Var1, 
            Topic.userWrittenMeetingTitle2
        )

    - kind: SetMultipleVariables
      id: setVariable_MTXnz7
      assignments:
        - variable: Global.currentMeeting.start
          value: |-
            =Text(
                DateAdd(
                    DateTimeValue(Global.confirmedSlotStartDateTime),
                    TimeZoneOffset(),
                    TimeUnit.Minutes
                ),
                "yyyy-mm-ddThh:mm:ssZ"
            )

        - variable: Global.currentMeeting.end
          value: |-
            =Text(
                DateAdd(
                    DateTimeValue(Global.confirmedSlotEndDateTime),
                    TimeZoneOffset(),
                    TimeUnit.Minutes
                ),
                "yyyy-mm-ddThh:mm:ssZ"
            )

        - variable: Global.currentMeetingsubject
          value: =Topic.userMeetingTitle

        - variable: Global.currentMeeting.Value
          value: =Topic.userMeetingTitle

        - variable: Global.currentMeetingDisplayName
          value: =Topic.userMeetingTitle

        - variable: Global.currentMeeting.organizer
          value: =System.User.Email

    - kind: SendActivity
      id: sendActivity_CORqov
      activity: |-
        Great — I’ve saved the Option:

        {Topic.confirmedUserOption}
        as the confirmed time slot.

        The meeting title will be:

        {Topic.userMeetingTitle}

inputType: {}
outputType: {}