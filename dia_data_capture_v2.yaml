kind: AdaptiveDialog
inputs:
  - kind: AutomaticTaskInput
    propertyName: diaTaskRecord
    description: DIA Task record data

  - kind: AutomaticTaskInput
    propertyName: selectedDIARecord
    description: The record data for the selected DIA
    shouldPromptUser: true

modelDescription: Helps capture data for a DIA summary.
beginDialog:
  kind: OnRedirect
  id: main
  actions:
    - kind: ParseValue
      id: 79C094
      variable: Topic.selectedDIATask
      valueType:
        kind: Record
        properties:
          AssignedToEmail: String
          AssignedToUsername: String
          DIAResponseReceived: Number
          DIATaskId: String
          DisplayName: String
          ExecutiveSummary: String
          KeyNextSteps: String
          KeyUpdates: String
          KpiId: String
          OwnerId: String
          PlannerTaskId: String
          Status: Number
          TaskDueDate: String
          TaskName: String
          TaskStartDate: String
          TaskType: Number
          TierCode: String

      value: =Topic.diaTaskRecord

    - kind: SetVariable
      id: setVariable_q7tjMz
      variable: Topic.selectedDIA
      value: =Topic.selectedDIARecord

    - kind: SetVariable
      id: setVariable_huesOJ
      variable: Global.DiaDocAnalysis
      value: =""

    - kind: SetVariable
      id: setVariable_ZGYK9m
      variable: Topic.Var3
      value: =["Fill manually"]

    - kind: ConditionGroup
      id: conditionGroup_Et5jC5
      conditions:
        - id: conditionItem_6qoM5t
          condition: =Topic.selectedDIATask.TaskType = 3
          actions:
            - kind: SetVariable
              id: setVariable_SRzdlq
              variable: Topic.Var3
              value: =["Fill manually", "Fill from example data", "Nothing to contribute to this DIA"]

        - id: conditionItem_5hj2cW
          condition: =Topic.selectedDIATask.TaskType = 2
          actions:
            - kind: SetVariable
              id: Cpr8DG
              variable: Topic.Var3
              value: =["Fill manually", "Draft DIA from available data"]

        - id: conditionItem_F3lNie
          condition: =Topic.selectedDIATask.TaskType = 1
          actions:
            - kind: SetVariable
              id: setVariable_sXZRwL
              variable: Topic.lowerTierCode
              value: =Switch(Topic.selectedDIA.TierCode, "T4", "T3", "T3", "T2", "T2", "T1", "Unclassified")

            - kind: InvokeFlowAction
              id: invokeFlowAction_EnXBkI
              input:
                binding:
                  text: =Topic.selectedDIA.KpiId
                  text_1: =Topic.lowerTierCode

              output:
                binding:
                  lowertierkpidiadata: Topic.lowerTierKpiDIAData

              flowId: dfcaccfc-b26f-f111-ab0d-7c1e528d4fea

            - kind: ConditionGroup
              id: conditionGroup_aj9v1s
              conditions:
                - id: conditionItem_XyTBWX
                  condition: =!IsBlank(Topic.lowerTierKpiDIAData)
                  actions:
                    - kind: ParseValue
                      id: ASZOgh
                      variable: Topic.Var2
                      valueType:
                        kind: Record
                        properties:
                          AssignedToEmail: String
                          AssignedToUsername: String
                          BalancedScorecard: String
                          CurrentResponse: String
                          DIA: String
                          DIAResponseReceived: Number
                          DIATaskId: String
                          DIATaskName: String
                          DIAType: String
                          DIAUserInput: String
                          KPIDataPoints: String
                          KPIName: String
                          ModifiedOn: String
                          NextSteps: String
                          OwnerId: String
                          PatientImpact: String
                          PlannerTaskId: String
                          Recommendation: String
                          Situation: String
                          Status: Number
                          TaskDueDate: String
                          TaskStartDate: String
                          TaskType: Number

                      value: =Topic.lowerTierKpiDIAData

                    - kind: Question
                      id: question_qXcqMq
                      interruptionPolicy:
                        allowInterruption: true

                      variable: init:Topic.Var5
                      prompt: |-
                        I've found data from a previously submitted DIA for the same KPI on a lower tier - **{Topic.lowerTierCode}** - submitted on **{Text(DateTimeValue(Topic.Var2.ModifiedOn), "yyyy-MM-dd HH:mm")}**.

                        Do you want me to pull in this data to help draft your own DIA?
                      entity:
                        kind: EmbeddedEntity
                        definition:
                          kind: ClosedListEntity
                          items:
                            - id: Yes
                              displayName: Yes

                            - id: No
                              displayName: No

                    - kind: ConditionGroup
                      id: conditionGroup_HeuPbQ
                      conditions:
                        - id: conditionItem_dHWC2Y
                          condition: =Topic.Var5 = 'cr1d7_agenttIFALA.topic.DIADataCaptureV2.main.question_qXcqMq'.Yes
                          actions:
                            - kind: SetMultipleVariables
                              id: BUg8BY
                              assignments:
                                - variable: Topic.situationData
                                  value: =Topic.Var2.Situation

                                - variable: Topic.currentResponseData
                                  value: =Topic.Var2.CurrentResponse

                                - variable: Topic.patientImpactData
                                  value: =Topic.Var2.PatientImpact

                                - variable: Topic.balancedScorecardData
                                  value: =Topic.Var2.BalancedScorecard

                                - variable: Topic.diaData
                                  value: =Topic.Var2.DIA

                                - variable: Topic.recommendationData
                                  value: =Topic.Var2.Recommendation

                                - variable: Topic.nextStepsData
                                  value: =Topic.Var2.NextSteps

                                - variable: Topic.diaType
                                  value: =Topic.Var2.DIAType

                                - variable: Topic.diaUserInput
                                  value: =Topic.Var2.DIAUserInput

                            - kind: GotoAction
                              id: NeNYKT
                              actionId: HDldMb

                        - id: conditionItem_tCnSVW
                          condition: =Topic.Var5 = 'cr1d7_agenttIFALA.topic.DIADataCaptureV2.main.question_qXcqMq'.No

            - kind: SetVariable
              id: T5FqjD
              variable: Topic.Var3
              value: =["Fill manually", "Fill from example data"]

    - kind: Question
      id: question_uu0MaH
      interruptionPolicy:
        allowInterruption: true

      variable: init:Topic.Var1
      prompt: How would you like to complete the DIA?
      entity:
        kind: DynamicClosedListEntity
        items: =Topic.Var3

    - kind: ConditionGroup
      id: conditionGroup_x8kfR5
      conditions:
        - id: conditionItem_m8oYWE
          condition: =Topic.Var1 = "Fill manually"
          actions:
            - kind: SetVariable
              id: setVariable_7yA4Qk
              variable: Topic.pullFromPreRead
              value: =false

        - id: conditionItem_TrbsGs
          condition: =Topic.Var1 = "Fill from example data"
          actions:
            - kind: SetMultipleVariables
              id: xYv13M
              assignments:
                - variable: Topic.situationData
                  value: |-
                    ="Due to variations in how RFT is calculated across suppliers, a single deviation can lead to the DS RFT metric presenting as red.
                    For example, in January 2028 there was one final batch from Aplora with a single deviation, resulting in 0% RFT."

                - variable: Topic.currentResponseData
                  value: |-
                    ="The deviation is being managed through the standard DMAIC process with appropriate corrective actions identified.
                    This is not a repeat occurrence.
                    The RFT calculation methodology will be discussed at the next Quality Council meeting with a proposal to count all process steps at Aplora to align with other DS CMOs."

                - variable: Topic.patientImpactData
                  value: ="There is no impact to patients."

                - variable: Topic.balancedScorecardData
                  value: ="Updating the calculation methodology will allow for a more accurate representation of the RFT metric within EM DS."

                - variable: Topic.diaData
                  value: ="EM DS Quality Council to confirm the proposed RFT calculation approach. Need input from Vitor Antonio and Dilawar Mansoori."

                - variable: Topic.recommendationData
                  value: ="Align Aplora RFT calculation methodology with other DS CMOs to ensure consistent reporting."

                - variable: Topic.nextStepsData
                  value: ="Discuss and confirm the RFT calculation approach"

                - variable: Topic.diaType
                  value: Input

                - variable: Topic.diaUserInput
                  value: =Blank()

                - variable: Topic.EmailIds
                  value: =Blank()

            - kind: SetVariable
              id: setVariable_SxLGNL
              variable: Topic.pullFromPreRead
              value: =false

            - kind: GotoAction
              id: tg4JRb
              actionId: HDldMb

        - id: conditionItem_A6vS7c
          condition: =Topic.Var1 = "Nothing to contribute to this DIA"
          actions:
            - kind: SetVariable
              id: setVariable_WldbzK
              variable: Topic.skipDIAData
              value: =true

            - kind: GotoAction
              id: xj8ZR2
              actionId: invokeFlowAction_bVP51Z

        - id: conditionItem_S0nXPJ
          condition: =Topic.Var1 = "Draft DIA from available data"
          actions:
            - kind: InvokeAIBuilderModelAction
              id: invokeAIBuilderModelAction_p5NWU4
              input:
                binding:
                  EntityName: =Topic.selectedDIATask.TaskName
                  EntityType: |-
                    =Switch(
                        Topic.selectedDIATask.TaskType,
                        0, "Planner",
                        1, "KPI",
                        2, "MSProject",
                        3, "Optional",
                        "Unknown"
                    )
                  ExecutiveSummary: =Topic.selectedDIATask.ExecutiveSummary
                  KeyNextSteps: =Topic.selectedDIATask.KeyNextSteps
                  KeyUpdates: =Topic.selectedDIATask.KeyUpdates
                  OwnerEmail: =Topic.selectedDIATask.AssignedToEmail
                  RAG: Red

              output:
                binding:
                  predictionOutput: Topic.draftedDIAData

              aIModelId: eeaf9def-2cbf-4351-9dd2-6dd7cd81528b

            - kind: SetMultipleVariables
              id: uBxcoa
              assignments:
                - variable: Topic.situationData
                  value: =Topic.draftedDIAData.structuredOutput.situationData

                - variable: Topic.currentResponseData
                  value: =Topic.draftedDIAData.structuredOutput.currentResponseData

                - variable: Topic.patientImpactData
                  value: =Topic.draftedDIAData.structuredOutput.patientImpactData

                - variable: Topic.balancedScorecardData
                  value: =Topic.draftedDIAData.structuredOutput.balancedScorecardData

                - variable: Topic.diaData
                  value: =Topic.draftedDIAData.structuredOutput.diaData

                - variable: Topic.recommendationData
                  value: =Topic.draftedDIAData.structuredOutput.recommendationData

                - variable: Topic.nextStepsData
                  value: =Topic.draftedDIAData.structuredOutput.nextStepsData

                - variable: Topic.diaType
                  value: =Topic.draftedDIAData.structuredOutput.diaType

                - variable: Topic.diaUserInput
                  value: =Topic.draftedDIAData.structuredOutput.diaUserInput

                - variable: Topic.EmailIds
                  value: =Topic.draftedDIAData.structuredOutput.diaUserInput

            - kind: GotoAction
              id: 1yhtaU
              actionId: HDldMb

    - kind: SetVariable
      id: setVariable_lyuy25
      variable: Topic.skipToSummary
      value: =false

    - kind: AdaptiveCardPrompt
      id: HDldMb
      card: |-
        ={
          '$schema': "https://adaptivecards.io/schemas/adaptive-card.json",
          type: "AdaptiveCard",
          version: "1.5",
          body: [
            {
              type: "TextBlock",
              text: "DIA Data Capture",
              size: "ExtraLarge",
              weight: "Bolder",
              wrap: true
            },
            {
              type: "TextBlock",
              text: "Please fill in all sections below.",
              wrap: true,
              spacing: "Small",
              color: "Default"
            },
            {
              type: "ColumnSet",
              separator: true,
              spacing: "Large",
              columns: []
            },
            {
              type: "TextBlock",
              text: "Situation",
              size: "Medium",
              weight: "Bolder",
              wrap: true,
              spacing: "Medium"
            },
            {
              type: "Input.Text",
              id: "situation",
              placeholder: "Enter the situation here...",
              isMultiline: true,
              isRequired: true,
              errorMessage: "Please provide the situation before continuing.",
              label: "Situation",
              value: Topic.situationData
            },
            {
              type: "ColumnSet",
              separator: true,
              spacing: "Large",
              columns: []
            },
            {
              type: "TextBlock",
              text: "Current Response",
              size: "Medium",
              weight: "Bolder",
              wrap: true,
              spacing: "Medium"
            },
            {
              type: "Input.Text",
              id: "current_response",
              placeholder: "Enter the current response here...",
              isMultiline: true,
              isRequired: true,
              errorMessage: "Please provide the current response before continuing.",
              label: "Current Response",
              value: Topic.currentResponseData
            },
            {
              type: "ColumnSet",
              separator: true,
              spacing: "Large",
              columns: []
            },
            {
              type: "TextBlock",
              text: "Patient Impact",
              size: "Medium",
              weight: "Bolder",
              wrap: true,
              spacing: "Medium"
            },
            {
              type: "Input.Text",
              id: "patient_impact",
              placeholder: "Enter the patient impact here...",
              isMultiline: true,
              isRequired: true,
              errorMessage: "Please provide the patient impact before continuing.",
              label: "Patient Impact",
              value: Topic.patientImpactData
            },
            {
              type: "ColumnSet",
              separator: true,
              spacing: "Large",
              columns: []
            },
            {
              type: "TextBlock",
              text: "Balanced Scorecard",
              size: "Medium",
              weight: "Bolder",
              wrap: true,
              spacing: "Medium"
            },
            {
              type: "Input.Text",
              id: "balanced_scorecard",
              placeholder: "Enter balanced scorecard details...",
              isMultiline: true,
              isRequired: true,
              errorMessage: "Please provide the balanced scorecard before continuing.",
              label: "Balanced Scorecard",
              value: Topic.balancedScorecardData
            },
            {
              type: "ColumnSet",
              separator: true,
              spacing: "Large",
              columns: []
            },
            {
              type: "TextBlock",
              text: "DIA",
              size: "Medium",
              weight: "Bolder",
              wrap: true,
              spacing: "Medium"
            },
            {
              type: "Input.ChoiceSet",
              id: "diaType",
              label: "DIA Type",
              isRequired: true,
              errorMessage: "Please select a DIA type before continuing.",
              placeholder: "Select a type...",
              choices: [
                { title: "Decision", value: "Decision" },
                { title: "Input", value: "Input" },
                { title: "Awareness", value: "Awareness" }
              ],
              style: "compact",
              value: Topic.diaType
            },
            {
              type: "Input.Text",
              id: "dia",
              placeholder: "Enter DIA details here...",
              isMultiline: true,
              isRequired: true,
              errorMessage: "Please provide DIA details before continuing.",
              label: "DIA",
              value: Topic.diaData
            },
            {
              type: "ColumnSet",
              separator: true,
              spacing: "Large",
              columns: []
            },
            {
              type: "TextBlock",
              text: "Recommendation",
              size: "Medium",
              weight: "Bolder",
              wrap: true,
              spacing: "Medium"
            },
            {
              type: "Input.Text",
              id: "recommendation",
              placeholder: "Enter your recommendation here...",
              isMultiline: true,
              isRequired: true,
              errorMessage: "Please provide a recommendation before continuing.",
              label: "Recommendation",
              value: Topic.recommendationData
            },
            {
              type: "ColumnSet",
              separator: true,
              spacing: "Large",
              columns: []
            },
            {
              type: "TextBlock",
              text: "Next Steps",
              size: "Medium",
              weight: "Bolder",
              wrap: true,
              spacing: "Medium"
            },
            {
              type: "Input.Text",
              id: "next_steps",
              placeholder: "Enter next steps here...",
              isMultiline: true,
              isRequired: true,
              errorMessage: "Please provide the next steps before submitting.",
              label: "Next Steps",
              value: Topic.nextStepsData
            }
          ],
          actions: [
            {
              type: "Action.Submit",
              title: "Submit",
              data: {
                step: "capture_all"
              }
            }
          ]
        }
      output:
        binding:
          actionSubmitId: Topic.actionSubmitId
          balanced_scorecard: Topic.balancedScorecardData
          current_response: Topic.currentResponseData
          dia: Topic.diaData
          diaType: Topic.diaType
          next_steps: Topic.nextStepsData
          patient_impact: Topic.patientImpactData
          recommendation: Topic.recommendationData
          situation: Topic.situationData
          step: Topic.step

      outputType:
        properties:
          actionSubmitId: String
          balanced_scorecard: String
          current_response: String
          dia: String
          diaType: String
          next_steps: String
          patient_impact: String
          recommendation: String
          situation: String
          step: String

    - kind: ConditionGroup
      id: conditionGroup_tPbBp4
      conditions:
        - id: conditionItem_7gjDSV
          condition: =Topic.diaType = "Input"
          actions:
            - kind: SendActivity
              id: sendActivity_VFpaqL
              activity: Because the DIA Type is set to **Input** please provide from who you need input from

            - kind: AdaptiveCardPrompt
              id: 8mB5Gf
              card: |-
                ={
                  type: "AdaptiveCard",
                  '$schema': "http://adaptivecards.io/schemas/adaptive-card.json",
                  version: "1.5",
                  body: [
                    { type: "TextBlock", text: "DIA User Input", weight: "Bolder", size: "Medium" },
                    {
                      type: "Input.ChoiceSet",
                      id: "people-picker",
                      label: "DIA User for Input", 
                      isRequired: false,
                      errorMessage: "A user is required",      
                      isMultiSelect: true,
                      'choices.data': {
                        type: "Data.Query",
                        dataset: "graph.microsoft.com/users"
                      }      
                    },

                    {
                      type: "ActionSet",
                      actions: [
                        { type: "Action.Submit", id: "submitDIAUsers", title: "Submit user(s)" },
                        { type: "Action.Submit", id: "skipDIAUser", title: "Skip", style: "destructive" }
                      ]
                    }
                  ]
                }
              output:
                binding:
                  actionSubmitId: Topic.actionSubmitId
                  people-picker: Topic.Var4

              outputType:
                properties:
                  actionSubmitId: String
                  people-picker: String

            - kind: InvokeFlowAction
              id: invokeFlowAction_pPe5VQ
              input:
                binding:
                  text: =Topic.Var4

              output:
                binding:
                  emailid: Topic.EmailIds

              flowId: 2f85de3d-595b-f111-bec7-000d3a3690d9

    - kind: SetVariable
      id: setVariable_87jozZ
      variable: Topic.diaUserInput
      value: =If(!IsBlank(Topic.EmailIds), Topic.EmailIds,"")

    - kind: Question
      id: question_QThqKj
      interruptionPolicy:
        allowInterruption: true

      variable: init:Topic.userChoice
      prompt: |-
        This is what I have so far:

        **Situation:**

        {Topic.situationData}

        **Current Response:**

        {Topic.currentResponseData}

        **Patient Impact:**

        {Topic.patientImpactData}

        **Balanced Scorecard:**

        {Topic.balancedScorecardData}

        **DIA Type:**

        {Topic.diaType}

        **DIA:**

        {Topic.diaData}

        **DIA Required Inputs:**

        {Topic.EmailIds}

        **Recommendation:**

        {Topic.recommendationData}

        **Next Steps:**

        {Topic.nextStepsData}
      entity:
        kind: EmbeddedEntity
        definition:
          kind: ClosedListEntity
          items:
            - id: Make some changes
              displayName: Make some changes

            - id: Looks good, let's submit
              displayName: Looks good, let's submit

    - kind: ConditionGroup
      id: conditionGroup_d5Vlaq
      conditions:
        - id: conditionItem_EB6Pry
          condition: =Topic.userChoice = 'cr1d7_agenttIFALA.topic.DIADataCaptureV2.main.question_QThqKj'.'Make some changes'
          actions:
            - kind: GotoAction
              id: goto_consolidated_card
              actionId: HDldMb

        - id: conditionItem_tGwl1b
          condition: =Topic.userChoice = 'cr1d7_agenttIFALA.topic.DIADataCaptureV2.main.question_QThqKj'.'Looks good, let''s submit'

    - kind: ConditionGroup
      id: conditionGroup_8gF202
      conditions:
        - id: conditionItem_j4r1ES
          condition: =Topic.selectedDIA.TaskType = 1
          actions:
            - kind: InvokeFlowAction
              id: invokeFlowAction_7bIZ5F
              input:
                binding:
                  text: =Topic.selectedDIA.KpiId

              output:
                binding:
                  kpidatapoints: Topic.kpiDataPoints

              flowId: f0316098-446e-f111-ab0d-70a8a5b1c926

    - kind: InvokeFlowAction
      id: invokeFlowAction_bVP51Z
      input:
        binding:
          boolean: =!Topic.skipDIAData
          text: |-
            =If(Topic.skipDIAData,
                JSON({
                    situationData: "N/A",
                    currentResponseData: "N/A",
                    patientImpactData: "N/A",
                    balancedScorecardData: "N/A",
                    diaData: "N/A",
                    recommendationData: "N/A",
                    nextStepsData: "N/A",
                    diaTypeData: "N/A",
                    diaUserInput: "N/A"
                }),
                JSON({
                    situationData: Topic.situationData,
                    currentResponseData: Topic.currentResponseData,
                    patientImpactData: Topic.patientImpactData,
                    balancedScorecardData: Topic.balancedScorecardData,
                    diaData: Topic.diaData,
                    recommendationData: Topic.recommendationData,
                    nextStepsData: Topic.nextStepsData,
                    diaTypeData: Topic.diaType,
                    diaUserInputData: If(!IsBlank(Topic.diaUserInput), Topic.diaUserInput, ""),
                    kpiDataPoints: If(!IsBlank(Topic.kpiDataPoints), Topic.kpiDataPoints, Blank())
                })
            )
          text_1: =Topic.selectedDIATask.DIATaskId

      output: {}
      flowId: e3211915-8353-f111-bec7-000d3a33da71

    - kind: InvokeFlowAction
      id: invokeFlowAction_CjE0zt
      input:
        binding:
          text: =Topic.selectedDIATask.PlannerTaskId

      output: {}
      flowId: ed532838-ca55-f111-bec6-7c1e528d4fea

    - kind: SendActivity
      id: sendActivity_sdDOGD
      activity: Your **- {Topic.selectedDIATask.DisplayName} -** was sucessfully submitted, thank you!

    - kind: BeginDialog
      id: tfEDCO
      dialog: cr1d7_agenttIFALA.topic.ResetConversation

inputType:
  properties:
    diaTaskRecord:
      displayName: diaTaskRecord
      type: String

    selectedDIARecord:
      displayName: selectedDIARecord
      type:
        kind: Record
        properties:
          AssignedToEmail: String
          AssignedToUsername: String
          DIAResponseReceived: Number
          DIATaskId: String
          DisplayName: String
          ExecutiveSummary: String
          KeyNextSteps: String
          KeyUpdates: String
          KpiId: String
          OwnerId: String
          PlannerTaskId: String
          Status: Number
          TaskDueDate: String
          TaskName: String
          TaskStartDate: String
          TaskType: Number
          TierCode: String

outputType:
  properties:
    diaReportOutput:
      displayName: diaReportOutput
      description: The AI generated DIA report based on user input.
      type: String

    diaReportSubjectOutput:
      displayName: diaReportSubjectOutput
      description: "AI generated DIA subject "
      type: String

    reportRecordOutput:
      displayName: reportRecordOutput
      type:
        kind: Record
        properties:
          balancedScorecard: String
          currentResponse: String
          dia: String
          nextSteps: String
          patientImpact: String
          recommendation: String
          situation: String