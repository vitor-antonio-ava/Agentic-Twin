    - kind: Question
      id: question_QThqKj
      interruptionPolicy:
        allowInterruption: true

      variable: init:Topic.userChoice
      prompt: |-
        This is what I have so far:

        **Situation:**

        {Topic.situationData}

        **Current Response:**

        {Topic.currentResponseData}

        **Patient Impact:**

        {Topic.patientImpactData}

        **Balanced Scorecard:**

