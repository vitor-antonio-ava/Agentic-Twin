kind: AdaptiveDialog
inputs:
  - kind: AutomaticTaskInput
    propertyName: diaTaskRecord
    description: DIA Task record data

modelDescription: Helps capture data for a DIA summary.
beginDialog:
  kind: OnRedirect
  id: main
  actions:
    - kind: ParseValue
      id: 79C094
      variable: Topic.selectedDIATask
      valueType:
        kind: Record
        properties:
          AssignedToEmail: String
          AssignedToUsername: String
          DIAResponseReceived: Number
          DIATaskId: String
          DisplayName: String
          ExecutiveSummary: String
          KeyNextSteps: String
          KeyUpdates: String
          KpiId: Blank
          OwnerId: String
          PlannerTaskId: String
          Status: Number
          TaskDueDate: String
          TaskName: String
          TaskStartDate: String
          TaskType: Number

      value: =Topic.diaTaskRecord

    - kind: SetVariable
      id: setVariable_huesOJ
      variable: Global.DiaDocAnalysis
      value: =""

    - kind: SetVariable
      id: setVariable_ZGYK9m
      variable: Topic.Var3
      value: =["Fill manually"]

    - kind: ConditionGroup
      id: conditionGroup_Et5jC5
      conditions:
        - id: conditionItem_6qoM5t
          condition: =Topic.selectedDIATask.TaskType = 3
          actions:
            - kind: SetVariable
              id: setVariable_SRzdlq
              variable: Topic.Var3
              value: =["Fill manually", "Auto‑fill from available data", "Nothing to contribute to this DIA"]

        - id: conditionItem_5hj2cW
          condition: =Topic.selectedDIATask.TaskType = 2
          actions:
            - kind: SetVariable
              id: Cpr8DG
              variable: Topic.Var3
              value: =["Fill manually", "Draft DIA from available data"]

        - id: conditionItem_F3lNie
          condition: =Topic.selectedDIATask.TaskType = 1
          actions:
            - kind: SetVariable
              id: T5FqjD
              variable: Topic.Var3
              value: =["Fill manually", "Auto‑fill from available data"]

    - kind: Question
      id: question_uu0MaH
      interruptionPolicy:
        allowInterruption: true

      variable: init:Topic.Var1
      prompt: How would you like to complete the DIA?
      entity:
        kind: DynamicClosedListEntity
        items: =Topic.Var3

    - kind: ConditionGroup
      id: conditionGroup_x8kfR5
      conditions:
        - id: conditionItem_m8oYWE
          condition: =Topic.Var1 = "Fill manually"
          actions:
            - kind: SetVariable
              id: setVariable_7yA4Qk
              variable: Topic.pullFromPreRead
              value: =false

        - id: conditionItem_TrbsGs
          condition: =Topic.Var1 = "Auto‑fill from available data"
          actions:
            - kind: SetMultipleVariables
              id: xYv13M
              assignments:
                - variable: Topic.situationData
                  value: |-
                    ="Due to variations in how RFT is calculated across suppliers, a single deviation can lead to the DS RFT metric presenting as red.
                    For example, in January 2028 there was one final batch from Aplora with a single deviation, resulting in 0% RFT."

                - variable: Topic.currentResponseData
                  value: |-
                    ="The deviation is being managed through the standard DMAIC process with appropriate corrective actions identified.
                    This is not a repeat occurrence.
                    The RFT calculation methodology will be discussed at the next Quality Council meeting with a proposal to count all process steps at Aplora to align with other DS CMOs."

                - variable: Topic.patientImpactData
                  value: ="There is no impact to patients."

                - variable: Topic.balancedScorecardData
                  value: ="Updating the calculation methodology will allow for a more accurate representation of the RFT metric within EM DS."

                - variable: Topic.diaData
                  value: ="EM DS Quality Council to confirm the proposed RFT calculation approach. Need input from Vitor Antonio and Dilawar Mansoori."

                - variable: Topic.recommendationData
                  value: ="Align Aplora RFT calculation methodology with other DS CMOs to ensure consistent reporting."

                - variable: Topic.nextStepsData
                  value: ="Discuss and confirm the RFT calculation approach"

                - variable: Topic.diaType
                  value: Input

                - variable: Topic.diaUserInput
                  value: vitor.x.antonio@gsk.com;dilawar.x.mansoori@gsk.com

                - variable: Topic.EmailIds
                  value: vitor.x.antonio@gsk.com;dilawar.x.mansoori@gsk.com

            - kind: SetVariable
              id: setVariable_SxLGNL
              variable: Topic.pullFromPreRead
              value: =false

            - kind: GotoAction
              id: dCqpnt
              actionId: question_QThqKj

        - id: conditionItem_A6vS7c
          condition: =Topic.Var1 = "Nothing to contribute to this DIA"
          actions:
            - kind: SetVariable
              id: setVariable_WldbzK
              variable: Topic.skipDIAData
              value: =true

            - kind: GotoAction
              id: xj8ZR2
              actionId: invokeFlowAction_bVP51Z

        - id: conditionItem_S0nXPJ
          condition: =Topic.Var1 = "Draft DIA from available data"
          actions:
            - kind: InvokeAIBuilderModelAction
              id: invokeAIBuilderModelAction_p5NWU4
              input:
                binding:
                  EntityName: =Topic.selectedDIATask.TaskName
                  EntityType: |-
                    =Switch(
                        Topic.selectedDIATask.TaskType,
                        0, "Planner",
                        1, "KPI",
                        2, "MSProject",
                        3, "Optional",
                        "Unknown"
                    )
                  ExecutiveSummary: =Topic.selectedDIATask.ExecutiveSummary
                  KeyNextSteps: =Topic.selectedDIATask.KeyNextSteps
                  KeyUpdates: =Topic.selectedDIATask.KeyUpdates
                  OwnerEmail: =Topic.selectedDIATask.AssignedToEmail
                  RAG: Red

              output:
                binding:
                  predictionOutput: Topic.draftedDIAData

              aIModelId: eeaf9def-2cbf-4351-9dd2-6dd7cd81528b

            - kind: SetMultipleVariables
              id: uBxcoa
              assignments:
                - variable: Topic.situationData
                  value: =Topic.draftedDIAData.structuredOutput.situationData

                - variable: Topic.currentResponseData
                  value: =Topic.draftedDIAData.structuredOutput.currentResponseData

                - variable: Topic.patientImpactData
                  value: =Topic.draftedDIAData.structuredOutput.patientImpactData

                - variable: Topic.balancedScorecardData
                  value: =Topic.draftedDIAData.structuredOutput.balancedScorecardData

                - variable: Topic.diaData
                  value: =Topic.draftedDIAData.structuredOutput.diaData

                - variable: Topic.recommendationData
                  value: =Topic.draftedDIAData.structuredOutput.recommendationData

                - variable: Topic.nextStepsData
                  value: =Topic.draftedDIAData.structuredOutput.nextStepsData

                - variable: Topic.diaType
                  value: =Topic.draftedDIAData.structuredOutput.diaType

                - variable: Topic.diaUserInput
                  value: =Topic.draftedDIAData.structuredOutput.diaUserInput

                - variable: Topic.EmailIds
                  value: =Topic.draftedDIAData.structuredOutput.diaUserInput

            - kind: GotoAction
              id: THvexi
              actionId: question_QThqKj

    - kind: ConditionGroup
      id: conditionGroup_MilMOY
      conditions:
        - id: conditionItem_lg01CO
          condition: =Topic.pullFromPreRead = true
          actions:
            - kind: BeginDialog
              id: iuPemk
              input: {}
              dialog: cr1d7_agenttIFALA.agent.Agent_Jb7
